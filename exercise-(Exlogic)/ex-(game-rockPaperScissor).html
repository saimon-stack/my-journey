<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>rock-paper-scissors</title>
    </head>
<body>
    <h1>rock-paper-scissors</h1>
    
    <!-- User Input Actions -->
    <button onclick="playgame('rock')">rock</button>
    <button onclick="playgame('paper')">paper</button>
    <button onclick="playgame('scissors')">scissors</button>
    
    <!-- Game State Management: Reset score data in memory and localStorage -->
    <button onclick="score = { wins: 0, losses: 0, ties: 0 }; localStorage.removeItem('score'); alert('Score reset! Wins: 0, Losses: 0, Ties: 0')">Reset Score</button>
    
    <script>
        // Initialize score object from persistent local storage or fall back to default counters
        let score = JSON.parse(localStorage.getItem('score')) || { wins: 0, losses: 0, ties: 0 };

        // Runtime state variable for the computer's current move
        let computerChoice = '';

        /**
         * Evaluates a single game round based on the user's choice against a randomized computer choice.
         * @param {string} userChoice - The option selected by the player ('rock', 'paper', 'scissors')
         */
        function playgame(userChoice) {
            
            // Step 1: Generate a pseudo-random value between 0 and 1
            let numberRandom = Math.random();

            // Step 2: Distribute probabilities equally across 3 choices (1/3 weight each)
            if (numberRandom > 2/3) {
                computerChoice = "rock"
            } else if (numberRandom > 1/3) {
                computerChoice = "paper"
            } else {
                computerChoice = "scissors"
            };
            
            // Step 3: Match outcomes and increment performance metrics accordingly

            if (userChoice === computerChoice) {

                // Handle Draw Scenario
                score.ties++;
                alert(`you chose ${userChoice}, computer chose ${computerChoice} it's a tie! \nWins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`);

            } else if (
                // Handle Player Win Configurations
                (userChoice === "rock" && computerChoice === "scissors") ||
                (userChoice === "paper" && computerChoice === "rock") ||
                (userChoice === "scissors" && computerChoice === "paper")
            ) {
                score.wins++;
                alert(`you chose ${userChoice}, computer chose ${computerChoice} you win!\nWins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`);

            } else {
                
                // Handle Player Loss Scenario
                score.losses++;
                alert(`you chose ${userChoice}, computer chose ${computerChoice} you lose!\nWins: ${score.wins}, Losses: ${score.losses}, Ties: ${score.ties}`);
            } 
            
            // Step 4: Serialize the updated score object and write back to local storage
            localStorage.setItem('score', JSON.stringify(score));
        }
    </script>
</body>
</html>
