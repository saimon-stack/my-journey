<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Server Monitor</title>      
    <style>
        /* General styles for the entire page */
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 15px; 
            font-weight: bold;
            font-size: 16px;
            color: #333;
            background-color: #fafafa;
        }

        /* Styles for wrapper blocks */
        div {
            margin: 14px 0;
        }

        /* Styles for input labels */
        label {
            display: inline-block;
            margin-right: 8px;
        }

        /* Set specific width for the temperature input */
        #temperature-input {
            width: 100px;
        }

        /* Pointer cursor for interactive elements */
        #door-status {
            cursor: pointer;
        }

        /* Modern and professional button styling */
        button {
            cursor: pointer;
            margin-top: 5px;
            margin-bottom: 5px;  
            padding: 6px 12px;
            font-weight: bold;
            border: 1px solid #ccc;
            border-radius: 4px;
            background-color: #e0e0e0;
        }

        button:hover {
            background-color: #d0d0d0;
        }

        /* Styles for status display values */
        .status-value {
            font-weight: normal;
            color: #666;
            margin-left: 5px;
        }

        #info-status1{
            color:#f80c0c;
            font-size: 11px;
            margin-left: 170px;
        }
        #info-status2{
            color:#f80c0c;
            font-size: 11px;
            margin-left:25px;
        }

        .cooling-mode{
            font-weight: bold;
        }

        .danger{ color:#f80c0c;}
        .warning{ color:#fff200;}
        .safe{ color:#00f539;}
    </style>     
</head>
<body>
    <main>
        <h1>Server Monitor</h1>
        
        <div>
            <label for="temperature-input">Temperature:</label>
            <input type="number" id="temperature-input" placeholder="10°C to 100°C" />
            <label id ="info-status1"></label>
        </div>
        
        <div>
            <label for="electric-pc">Electricity consumption:</label>
            <input type="number" id="Electricity-consumption" placeholder="Power consumption (kW)" />
            <label id ="info-status2"></label>
        </div>
        
        <div>
            <label for="door-status">Room door status:</label>
            <select id="door-status">
                <option value="closed">Closed</option>
                <option value="open">Open</option>
            </select>
        </div>
        
        <div>
            <button type="button" id="update-btn">Update</button>
        </div>
        
        <div>
            <label>Cooling system:</label>
            <span id="cooling-status" class="status-value">--</span>
        </div>
        
        <div>
            <label>Siren:</label>
            <span id="siren-status" class="status-value">--</span>
        </div>
    </main>
    <script>

        const temperatureInput = document.getElementById("temperature-input");
        const ElectricityConsumption = document.getElementById("Electricity-consumption");
        const doorStatus = document.getElementById("door-status");
        const updateBtn = document.getElementById("update-btn");
        const coolingStatus = document.getElementById("cooling-status");
        const sirenStatus = document.getElementById("siren-status");
        const infoStatus1 = document.getElementById("info-status1")
        const infoStatus2 = document.getElementById("info-status2")

        updateBtn.addEventListener("click", function() {

            const temperatureInputVL = Number(temperatureInput.value);
            const ElectricityConsumptionVL = Number(ElectricityConsumption.value);
            const doorStatusVL = doorStatus.value;

            if (temperatureInputVL < 10 || temperatureInputVL > 100){
                infoStatus1.textContent = "❗❗❗ VALUE 10°C TO 100°C"
                return;
            }
            if (ElectricityConsumptionVL < 0){
                infoStatus2.textContent = "❗❗❗ ELECTRICITY CONSUMPTION MUST BE GREATER THAN ZERO."
                return;
            }

            if ( temperatureInputVL < 24) {

                coolingStatus.textContent = "OFF"
                coolingStatus.className = "cooling-mode";

            } else if (temperatureInputVL >= 24 && temperatureInputVL <= 35){

                coolingStatus.textContent = "ON (Normal difficulty)";
                coolingStatus.className = "cooling-mode";

            } else {

                coolingStatus.textContent = "ON (Rapid Mode)";
                coolingStatus.className = "cooling-mode";

            }

            if ( temperatureInputVL > 45 || ElectricityConsumptionVL >50) {

                sirenStatus.textContent = "🚨 DANGER"
                sirenStatus.className = "danger"

            }else if (doorStatusVL === "open"){

                sirenStatus.textContent = "⚠ WARNING"
                sirenStatus.className = "warning"

            }else {
           
            sirenStatus.textContent = "✔ SAFE";
            sirenStatus.className = "safe";
                
            }

        }) 
        
        // click enter to guess
         document.addEventListener("keydown", function(event) { 

            if (event.key === "Enter") { 

                event.preventDefault(); 
                updateBtn.click();

            }
            })
    </script>
</body>
</html>
