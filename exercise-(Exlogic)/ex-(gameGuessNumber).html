<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <style>
        .hint { color: blue; }
        .win { color: green; font-weight: bold; font-size: 1.2rem; }
        .lose { color: red; font-weight: bold; font-size: 1.2rem; }
        #guess-btn{cursor:pointer;}
    </style>
</head>
<body>
    <h2>Guess My Number (1 - 100) </h2>
    <p>You have <span id="attempts-left">7</span> attempts remaining.</p>

    <!-- Input for the user's guess -->
    <input type="number" id="guess-input" placeholder="Enter 1-100" />
    <button id="guess-btn">Guess</button>

    <!-- Feedback message area -->
    <p id="feedback-display"></p>

    <script>
        // DOM Elements selection
        const guessInput = document.getElementById("guess-input");
        const guessBtn = document.getElementById("guess-btn");
        const turn = document.getElementById("attempts-left");
        const feedbackDisplay = document.getElementById("feedback-display"); // Fixed typo: displey -> display

        // SYSTEM SETUP: Generate secret number and initialize attempts
        const secretNumber = Math.floor(Math.random() * 100) + 1;
        let attemptsLeft = 7;
        
        // Event listener for the guess action
        guessBtn.addEventListener("click", function() {
            const userChoice = Number(guessInput.value); // Fixed typo: number -> Number

            // Validation: Ensure input is within the 1-100 range
            if (userChoice < 1 || userChoice > 100) {
                feedbackDisplay.textContent = "Please enter a number between 1 and 100!";
                feedbackDisplay.className = "lose";
                return; 
            }

            // Update remaining attempts state
            attemptsLeft -= 1;
            turn.textContent = attemptsLeft; // Moved here to avoid repetition

            // Game logic branching
            if (userChoice === secretNumber) {
                feedbackDisplay.textContent = "Congratulations! You guessed it!";  
                feedbackDisplay.className = "win";
                guessBtn.disabled = true; // Lock button on win
                return;
            } 
            
            // Check for Game Over condition if the guess was wrong
            if (attemptsLeft === 0) {
                feedbackDisplay.textContent = "Game Over! The secret number was " + secretNumber;
                feedbackDisplay.className = "lose";
                guessBtn.disabled = true; // Lock button on lose
                return;
            }

            // Provide hints if the game is still active
            if (userChoice > secretNumber) {
                feedbackDisplay.textContent = "Too high!";
                feedbackDisplay.className = "hint";
            } else {
                feedbackDisplay.textContent = "Too low!";
                feedbackDisplay.className = "hint";
            }
        });

        // click enter to guess
         guessInput.addEventListener("keydown", function(event) { 

            if (event.key === "Enter") { 

                guessBtn.click();

            }
        });
    </script>
</body>
</html>
