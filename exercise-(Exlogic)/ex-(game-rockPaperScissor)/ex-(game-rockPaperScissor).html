    <!DOCTYPE html>
    <html lang="en">
        <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>rock-paper-scissors</title>

            <style>
                body{
                    background-color:black;
                    color: white;
                    font-family: Arial;
                }
                .move-icon{
                    height: 50px;
                    cursor: pointer;

                }
                .move-btn{
                    background-color:transparent;
                    border: 3px solid white;
                    width: 100px;
                    height: 100px;
                    border-radius:50px;
                    margin: 10px;
                    cursor: pointer;
                }
                .output{
                    margin:10px;
                    margin-top:40px;
                }
                .reset-btn{
                    cursor:pointer;
                    margin:10px;
                    border:none;
                    padding:10px
                }
            </style>
        </head>
    <body>
        <h1>rock-paper-scissors</h1>
        
        <div>
        <button onclick="playgame('rock')" class="move-btn"><img src="images/rock-emoji.png" class="move-icon"></button>
        <button onclick="playgame('paper')" class="move-btn"><img src="images/paper-emoji.png" class="move-icon"></button>
        <button onclick="playgame('scissors')" class="move-btn"><img src="images/scissors-emoji.png" class="move-icon"></button>
        </div>

        <div class = "output"></div>

        <button class="reset-btn" onclick="resetScore()">Reset Score</button>
        
        <script>
            let score = JSON.parse(localStorage.getItem('score')) || { wins: 0, losses: 0, ties: 0 };
            const showOutput = document.querySelector(".output");
            let result = "";

            showOutput.innerHTML = `
                <p>
                    Wins: ${score.wins},
                    Losses: ${score.losses},
                    Ties: ${score.ties}
                </p>`

                function resetScore(){
                    score = { wins: 0, losses: 0, ties: 0 }; 
                    localStorage.removeItem('score'); 
                    showOutput.innerHTML =`<p>Wins: 0, Losses: 0, Ties: 0</p>`
                }

            function playgame(userChoice) {

                let computerChoice = '';
                const numberRandom = Math.random();

                if (numberRandom > 2/3) {
                    computerChoice = "rock"
                } else if (numberRandom > 1/3) {
                    computerChoice = "paper"
                } else {
                    computerChoice = "scissors"
                };
                
                if (userChoice === computerChoice) {

                    score.ties++;
                    result = "it's a tie!"

                } else if (
                    (userChoice === "rock" && computerChoice === "scissors") ||
                    (userChoice === "paper" && computerChoice === "rock") ||
                    (userChoice === "scissors" && computerChoice === "paper")
                ) {

                    score.wins++;
                    result = "you win!"

                } else {
                    
                    score.losses++;
                    result = "you lose!"
                    
                } 
                
                showOutput.innerHTML = ` 
                    <h2>${result}</h2>
                    <p>you chose => 
                    <img src="images/${userChoice}-emoji.png" class="move-icon">    

                    <img src="images/${computerChoice}-emoji.png" class="move-icon"> 
                    <= computer chose</p>

                    <p>
                        Wins: ${score.wins},
                        Losses: ${score.losses},
                        Ties: ${score.ties}
                    </p>`
                localStorage.setItem('score', JSON.stringify(score));
            }
        </script>
    </body>
    </html>
