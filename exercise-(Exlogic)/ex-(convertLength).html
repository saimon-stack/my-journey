<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>convertLength</title>
    </head>
    <body>
    <script>
        /**
         * Takes a number and a unit ( "km" or "miles" or "meters" or "feet") and converts the number to the other unit.
         * Standardized for school use
         * NOTE: conversion formula
         * 2.1: 1km = 0.62137119 miles , 1 mile = 1.60934 km
         * 2.2: 1km = 3280.8399 feet , 1 feet = 0.0003048 km
         * 2.3: 1km = 1000 meters , 1 meter = 0.001 km
         * 2.4: 1 mile = 5280 feet , 1 feet = 0.000189394 miles
         * 2.5: 1 mile = 1609.34 meters , 1 meter = 0.000621371 miles
         * 2.6: 1 feet = 0.3048 meters , 1 meter = 3.28084 feet
         * @param {number} length - The numeric value to be converted.
         * @param {string} from - The unit of the input length ("km" or "miles" or "feet" or "meters").
         * @param {string} to - The unit to convert to ("km" or "miles" or "feet" or "meters").
         * @returns {number} - The converted length in the specified unit.
         */
                function convertLength(length, from, to) {
                    // 1. Guard Clause (Input validation)
                    if (typeof length !== 'number' || length < 0) {
                        throw new Error("Invalid input: Length must be a non-negative number.");
                    }
                   
                    if (from === to) {
                        return length; // No conversion needed if units are the same
                    }

            // 2. Conversion Logic
                    const conversionRates = {
                        km: { miles: 0.62137119, feet: 3280.8399, meters: 1000 },
                        miles: { km: 1 / 0.62137119, feet: 5280, meters: 1609.34 },
                        feet: { km: 1 / 3280.8399, miles: 1 / 5280, meters: 0.3048 },
                        meters: { km: 1 / 1000, miles: 1 / 1609.34, feet: 3.28084 }
                    };
                    if (!conversionRates[from] || !conversionRates[to]) {
                        throw new Error("Invalid input: Units must be either 'km', 'miles', 'feet', or 'meters'.");
                    }
                    return length * conversionRates[from][to];
                     
                   
                }

        // ==========================================
        // TEST CASES
        // ==========================================
        // Case 1: Convert 5 km to miles.
        // Expected: 3.106855 miles
            let length1 = convertLength(5, "km", "miles");
            console.log("Test Case 1:", Math.abs(length1 - 3.106855) < 0.0001 ? "PASSED" : "FAILED (Got: " + length1 + ")");

        // Case 2: Convert 3.106855 miles to km.
        // Expected: 5 km
            let length2 = convertLength(3.106855, "miles", "km");
            console.log("Test Case 2:", Math.abs(length2 - 5) < 0.0001 ? "PASSED" : "FAILED (Got: " + length2 + ")");

        // Case 3: convert 5 km to feet
        // Expected: 16404.1995 feet
            let length3 = convertLength(5, "km", "feet");
            console.log("Test Case 3:", Math.abs(length3 - 16404.1995) < 0.0001 ? "PASSED" : "FAILED (Got: " + length3 + ")");

        // Case 4: convert 5 feet to km
        // Expected: 0.001524 km
            let length4 = convertLength(5, "feet", "km");
            console.log("Test Case 4:", Math.abs(length4 - 0.001524) < 0.0001 ? "PASSED" : "FAILED (Got: " + length4 + ")");

        // Case 5: convert 5 km to meters
        // Expected: 5000 meters
            let length5 = convertLength(5, "km", "meters");
            console.log("Test Case 5:", Math.abs(length5 - 5000) < 0.0001 ? "PASSED" : "FAILED (Got: " + length5 + ")");

        // Case 6: convert 5 meters to km
        // Expected: 0.005 km
            let length6 = convertLength(5, "meters", "km");
            console.log("Test Case 6:", Math.abs(length6 - 0.005) < 0.0001 ? "PASSED" : "FAILED (Got: " + length6 + ")");

        // Case 7: convert 5 miles to feet
        // Expected: 26400 feet
            let length7 = convertLength(5, "miles", "feet");
            console.log("Test Case 7:", Math.abs(length7 - 26400) < 0.0001 ? "PASSED" : "FAILED (Got: " + length7 + ")");

        // Case 8: convert 5 feet to miles
        // Expected: 0.00094697 miles
            let length8 = convertLength(5, "feet", "miles");
            console.log("Test Case 8:", Math.abs(length8 - 0.00094697) < 0.0001 ? "PASSED" : "FAILED (Got: " + length8 + ")");

        // Case 9: convert 5 miles to meters
        // Expected: 8046.7 meters
            let length9 = convertLength(5, "miles", "meters");
            console.log("Test Case 9:", Math.abs(length9 - 8046.7) < 0.0001 ? "PASSED" : "FAILED (Got: " + length9 + ")");

        // Case 10: convert 5 meters to miles
        // Expected: 0.00310686 miles
            let length10 = convertLength(5, "meters", "miles");
            console.log("Test Case 10:", Math.abs(length10 - 0.00310686) < 0.0001 ? "PASSED" : "FAILED (Got: " + length10 + ")");

        // Case 11: convert 5 feet to meters
        // Expected: 1.524 meters
            let length11 = convertLength(5, "feet", "meters");
            console.log("Test Case 11:", Math.abs(length11 - 1.524) < 0.0001 ? "PASSED" : "FAILED (Got: " + length11 + ")");

        // Case 12: convert 5 meters to feet
        // Expected: 16.4042 feet
            let length12 = convertLength(5, "meters", "feet");
            console.log("Test Case 12:", Math.abs(length12 - 16.4042) < 0.0001 ? "PASSED" : "FAILED (Got: " + length12 + ")");

        // Case 13: invalid input (negative length).
        // Expected: Error thrown
            try {
                convertLength(-5, "km", "miles");
                console.log("Test Case 13: FAILED (No error thrown for negative length)");
            } catch (error) {
                console.log("Test Case 13: PASSED (Error thrown as expected)");

         // Case 14: invalid input (invalid unit).
         // Expected: Error thrown
             try {
                convertLength(5, "meters", "lightyears");
                console.log("Test Case 14: FAILED (No error thrown for invalid unit)");
            } catch (error) {
                console.log("Test Case 14: PASSED (Error thrown as expected)");
                }

        // Case 15: invalid input (same unit).
        // Expected: No conversion needed, return the same length
            let length15 = convertLength(5, "km", "km");
            console.log("Test Case 15:", length15 === 5 ? "PASSED" : "FAILED (Got: " + length15 + ")");
            }
    </script>
  </body>
</html>
