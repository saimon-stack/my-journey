<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>booleans ex2.2</title>
    </head>
    <body> 
        <button onclick="
        randomNumber = Math.random();
        if (randomNumber < 0.5) {
            result = 'heads';
        } else {
            result = 'tails';
        }
        console.log(result);
        ">
            Flip Coin
        </button>
        <p>guess</p>
        <button onclick="
        if (result === 'heads'){
            alert('You guessed heads and it is heads! You win!');
        }else{
            alert('You guessed heads and it is tails! You lose!');
        }
        ">
            heads
        </button>
        <button onclick="
        if (result === 'tails'){
            alert('You guessed tails and it is tails! You win!');
        }else{
            alert('You guessed tails and it is heads! You lose!');
        }
        ">tails</button>
        <script>
            let randomNumber = Math.random();
            let result='';
        </script>
    </body>
</html>
