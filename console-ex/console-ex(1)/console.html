<html>
  <head>
    <meta charset UTF="8" />
    <title>cart quantity</title>
    <link rel="stylesheet" href="console.css" />
  </head>
  <body>
     <script src="console.js"></script>
    <button type="button" onclick="console.log(`cart quantity: ${cartQuantity}`)">Show Quantity</button>
    <button type="button" onclick=
    "cartQuantity += 1;
    console.log(`cart quantity: ${cartQuantity}`)
    ">Add to Cart</button>
    <button type="button" onclick=
    "cartQuantity += 2;
    console.log(`cart quantity: ${cartQuantity}`)"
    ">+2 </button>

    "cartQuantity += 3;

    <button type="button" onclick=
    "cartQuantity = 0
    console.log(`cart quantity: ${cartQuantity}`)"
    ">Reset cart</button>
