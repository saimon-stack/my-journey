<head>
    <title>My Button Page 2</title>
    <meta charset="UTF-8">
<style>
.nike
  {
      font-size:20px;
      font-weight: bold;
  }
.stock
  {
      font-size:15px;
      color:rgb(0, 118, 0);
  }
.a
{
    color:rgb(0, 113, 133);
}
.free
{
      font-size:15px;
}
#cart
{
      border-radius:20px;
      border:none;
      background-color:rgb(255, 216, 20);
      height:25px;
      width:95px;
      font-size:12px;
      margin-right:5px;
      cursor:pointer;
      transition: opacity 0.15s;
}
#cart:hover
{
      opacity:0.7;
}
#cart:active
{
      opacity:0.5;
}

#added{

      font-size:10px;
      color:rgb(0, 118, 0);
      font-weight: bold;
      opacity:0;
      transition: opacity 0.3s ease;
      margin-left:25px;
      margin-bottom:0px;
}
#added.show
{
       font-size:10px;
      color:rgb(0, 118, 0);
      font-weight: bold;
      opacity:1;
      transition: opacity 0.3s ease;
      margin-left:25px;
      margin-bottom:0px;
}
#bought
{
      font-size:10px;
      color:rgb(0, 118, 0);
      font-weight: bold;
      opacity:0;
      transition: opacity 0.3s ease;
      margin-left:131px;
      margin-bottom:0px;
}
#bought.show
{
      font-size:10px;
      color:rgb(0, 118, 0);
      font-weight: bold;
      opacity:1;
      transition: opacity 0.3s ease;
      margin-left:131px;
      margin-bottom:0px;
}
.buy
{
      border-radius:20px;
      border:none;
      background-color:rgb(255, 164, 28);
      height:25px;
      width:95px;
      font-size:12px;
      margin-right:5px;
      cursor:pointer;
      transition: opacity 0.15s;
}
.buy:hover
{
      opacity:0.7;
}
.buy:active
{
      opacity:0.5;
}
</style>
</head>
<body>
<a href="https://www.amazon.com/" class="a">Back to amazon</a>
<p class="nike">Nike Black Running Shoes</p>
<p class="stock">$39 - in stock.</p>
<p class="free">Free delivery tomorow.</p>
<p id="added" class="added">✓added</p>
<p id="bought" class="bought">✓bought</p>
<button id="cart" type="button" onclick="addtoCart()">Add to cart</button>
<button class="buy" onclick="buyNow()">Buy now</button>
<script src="script-button(2).js"></script>
</body>
</html>
