<!DOCTYPE html>
<html>
    <head>
        <title>My JavaScript Page 2</title>
        <style>
            #dark
            {
                height:40px;
                width:100px;
                border-radius:5px;
                border:none;
                background-color:#f0f0f0;
                cursor:pointer;
            }
            body.dark-mode
            {
                background-color: black;
                color: white;
            }
        </style>
    </head>
    <body>
        <h1>My JavaScript Page 2</h1>
        <button type="button" id="dark" onclick="darkmode()">
            Toggle Dark Mode
        </button>
        <script>
            function darkmode()
            {
               document.body.classList.toggle('dark-mode');
            }
        </script>
        </body>
</html>
