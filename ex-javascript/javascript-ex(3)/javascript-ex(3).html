<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>print page</title>
<style>
    #print
    {
        height:30px;
        width:100px;
        border: 1px solid rgb(7, 6, 2);
        background-color:rgb(254, 255, 255);
        cursor:pointer;
        margin-top:0px;
        border-color:rgb(0, 119, 255);
        font-weight: bold;
        font-size: 15px;
        color:rgb(0, 119, 255);
         transition: opacity 0.5s ease, background-color 0.25s ease, color 0.25s ease, border-color 0.25s ease;
    }
    #print:hover
    {
        opacity: 0.8;
        border-color:white;
        color:white;
        background-color:rgb(0, 119, 255);
    }
    #print:active
    {
        opacity: 0.6;
    }
</style>
</head>
<body>
    <h2>Print page</h2>
    <button type="button" id="print" onclick="window.print()">
            Print
    </button>


</body>

</html>
